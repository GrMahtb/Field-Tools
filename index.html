<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>HTB Field Tools</title>

  <meta name="theme-color" content="#06101a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #06101a;
      --surface: rgba(8, 16, 26, 0.10);
      --surface-2: rgba(10, 24, 38, 0.18);
      --surface-3: rgba(20, 44, 64, 0.22);
      --primary: #ffed00;
      --primary-dark: #ccbe00;
      --text: #ffffff;
      --muted: #c1ceda;
      --border: rgba(151, 251, 255, 0.16);
      --cyan: #97fbff;
      --cyan-line: rgba(151, 251, 255, 0.75);
      --cyan-soft: rgba(151, 251, 255, 0.18);
      --radius: 18px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --header-base-h: 82px;
      --footer-base-h: 88px;

      --header-total-h: calc(var(--header-base-h) + var(--safe-top));
      --footer-total-h: calc(var(--footer-base-h) + var(--safe-bottom));
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: relative;
      background: var(--bg);
    }

    /* ═══════════════════════════════════════
       SVG-Hintergrund
    ═══════════════════════════════════════ */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: #06101a;
    }

    .bg-scene svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: var(--header-total-h);
      padding: calc(10px + var(--safe-top)) 14px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(6, 16, 26, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 237, 0, 0.95);
      z-index: 300;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .brand.hidden {
      display: none;
    }

    .logo-container {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.28);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 12px rgba(0,0,0,0.18);
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .brand-text {
      min-width: 0;
      line-height: 1.1;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.02rem;
      color: var(--primary);
      letter-spacing: 0.02em;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255,237,0,0.12);
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 0.74rem;
      color: var(--text);
      opacity: 0.88;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .appbar {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .appbar.active {
      display: flex;
    }

    #activeAppName {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-head {
      appearance: none;
      border: 1px solid rgba(151, 251, 255, 0.12);
      background: rgba(6, 16, 26, 0.18);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color .2s ease, background .2s ease, transform .15s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .btn-head:hover {
      border-color: rgba(151, 251, 255, 0.32);
      background: rgba(10, 24, 38, 0.32);
      transform: translateY(-1px);
    }

    #openExternalBtn {
      display: none;
    }

    #openExternalBtn.active {
      display: inline-flex;
    }

    /* ═══════════════════════════════════════
       MAIN
    ═══════════════════════════════════════ */
    .main-area {
      position: fixed;
      top: var(--header-total-h);
      left: 0;
      right: 0;
      bottom: var(--footer-total-h);
      z-index: 1;
      background: transparent;
    }

    #dashboard {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 18px 16px 26px;
    }

    .apps-stack {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    /* ═══════════════════════════════════════
       APP-CARDS
    ═══════════════════════════════════════ */
    .card {
      appearance: none;
      width: 100%;
      min-height: 120px;
      padding: 18px 18px;
      border-radius: 22px;
      border: 1px solid rgba(151, 251, 255, 0.18);
      background:
        linear-gradient(180deg, rgba(6,16,26,0.16) 0%, rgba(6,16,26,0.08) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      text-align: left;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 0 0 1px rgba(151,251,255,0.04),
        0 12px 28px rgba(0,0,0,0.28),
        0 0 24px rgba(151,251,255,0.10);
      transition: transform .18s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(151,251,255,0.08), rgba(151,251,255,0) 34%),
        radial-gradient(circle at 14% 18%, rgba(255,255,255,0.06), rgba(255,255,255,0) 30%);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 2px;
      background: linear-gradient(180deg, rgba(151,251,255,0), rgba(151,251,255,0.95), rgba(151,251,255,0));
      box-shadow: 0 0 18px rgba(151,251,255,0.45);
      border-radius: 999px;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(151, 251, 255, 0.42);
      background:
        linear-gradient(180deg, rgba(7,17,27,0.24) 0%, rgba(6,16,26,0.12) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 1px rgba(151,251,255,0.10),
        0 16px 30px rgba(0,0,0,0.32),
        0 0 32px rgba(151,251,255,0.16);
    }

    .card-copy {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-size: 1.02rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 12px;
      text-wrap: balance;
      text-shadow: 0 0 14px rgba(255,255,255,0.06);
    }

    .card-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 150px;
    }

    .card-bars span {
      display: block;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(151,251,255,0.95), rgba(151,251,255,0.14));
      box-shadow: 0 0 14px rgba(151,251,255,0.20);
    }

    .card-bars span:nth-child(1) { width: 118px; }
    .card-bars span:nth-child(2) { width: 86px; opacity: 0.84; }
    .card-bars span:nth-child(3) { width: 56px; opacity: 0.68; }

    /* ═══════════════════════════════════════
       ICONS rechts
    ═══════════════════════════════════════ */
    .icon-shell {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 18%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(103,108,116,0.65) 0%, rgba(47,51,57,0.74) 50%, rgba(24,27,31,0.82) 100%);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.12),
        inset 0 -1px 0 rgba(0,0,0,.35),
        0 0 18px rgba(151,251,255,0.12),
        0 14px 24px rgba(0,0,0,.32);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      z-index: 1;
    }

    .icon-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 14%, rgba(255,255,255,.15), rgba(255,255,255,0) 46%);
      pointer-events: none;
    }

    .icon-shell::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 19px;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .icon-shell svg {
      width: 36px;
      height: 36px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.18));
    }

    /* ═══════════════════════════════════════
       FRAMES
    ═══════════════════════════════════════ */
    #frameContainer {
      position: absolute;
      inset: 0;
      display: none;
      background: transparent;
    }

    #frameContainer.active {
      display: block;
    }

    #frameStage {
      position: absolute;
      inset: 0;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      display: none;
    }

    .app-frame.active {
      display: block;
    }

    /* ═══════════════════════════════════════
       LOADER
    ═══════════════════════════════════════ */
    #loader {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(6,16,26,.36);
      backdrop-filter: blur(4px);
    }

    #loader.active {
      display: flex;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loaderText {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ═══════════════════════════════════════
       INSTALL BAR
    ═══════════════════════════════════════ */
    .install-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(6,16,26,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      border-top: 2px solid rgba(255, 237, 0, 0.95);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: var(--footer-total-h);
      box-shadow: 0 -6px 18px rgba(0,0,0,0.18);
    }

    .install-bar.hidden {
      display: none;
    }

    .btn {
      background: linear-gradient(180deg, rgba(64,73,85,0.42) 0%, rgba(41,49,59,0.42) 100%);
      color: var(--text);
      border: 1px solid rgba(151,251,255,0.16);
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform .15s ease, box-shadow .2s ease;
      min-width: 240px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 0 16px rgba(151,251,255,0.08);
    }

    .btn:hover {
      background: linear-gradient(180deg, rgba(74,84,97,0.50) 0%, rgba(50,59,69,0.50) 100%);
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(151,251,255,0.14);
    }

    .btn-primary {
      background: rgba(255,237,0,0.90);
      color: #000000;
      border-color: rgba(255,237,0,0.95);
      box-shadow: 0 0 18px rgba(255,237,0,0.16);
    }

    .btn-primary:hover {
      background: rgba(204,190,0,0.92);
      border-color: rgba(204,190,0,0.96);
    }

    .install-note {
      font-size: 0.76rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 520px;
      text-shadow: 0 0 10px rgba(0,0,0,0.25);
    }

    @media (max-width: 520px) {
      .card {
        min-height: 112px;
        padding: 16px 16px;
      }

      .card-title {
        font-size: 0.95rem;
      }

      .card-bars span:nth-child(1) { width: 94px; }
      .card-bars span:nth-child(2) { width: 72px; }
      .card-bars span:nth-child(3) { width: 46px; }

      .icon-shell {
        width: 66px;
        height: 66px;
      }

      .icon-shell svg {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>

  <footer class="install-bar" id="installBar">

    <div class="install-note" id="installNote"></div>
  </footer>

  <script src="./apps.js"></script>
  <script>
    const state = {
      currentAppId: null
    };

    let deferredPrompt = null;

    const dashboard = document.getElementById("dashboard");
    const appGrid = document.getElementById("appGrid");
    const frameContainer = document.getElementById("frameContainer");
    const frameStage = document.getElementById("frameStage");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");

    const brandArea = document.getElementById("brandArea");
    const appBar = document.getElementById("appBar");
    const activeAppName = document.getElementById("activeAppName");
    const openExternalBtn = document.getElementById("openExternalBtn");

    const installBar = document.getElementById("installBar");
    const installBtnFooter = document.getElementById("installBtnFooter");
    const installNote = document.getElementById("installNote");

    function getAppById(id) {
      return (window.APPS || []).find(app => app.id === id);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true;
    }

    function showLoader(text = "App wird geladen …") {
      loaderText.textContent = text;
      loader.classList.add("active");
    }

    function hideLoader() {
      loader.classList.remove("active");
    }

    function updateInstallUI() {
      if (isStandalone()) {
        installBar.classList.add("hidden");
        return;
      }

      installBar.classList.remove("hidden");

      if (isIOS()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "iPhone / iPad: Teilen → Zum Home-Bildschirm";
        return;
      }

      if (deferredPrompt) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "App kann direkt installiert werden.";
        return;
      }

      if (isAndroid()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "Falls kein Dialog erscheint: Chrome-Menü ⋮ → App installieren";
        return;
      }

      installBtnFooter.style.display = "none";
      installNote.textContent = "";
    }

    function getAppIconSVG(id) {
      switch (id) {
        case "schwingungsmesser":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

          `;
      }
    }

    function getAppIconMarkup(id) {
      return `
        <div class="icon-shell" aria-hidden="true">
          ${getAppIconSVG(id)}
        </div>
      `;
    }

    function renderDashboard() {
      appGrid.innerHTML = (window.APPS || []).map(app => `
        <button class="card" onclick="openApp('${app.id}')" aria-label="${app.name}">
          <div class="card-copy">
            <div class="card-title">${app.name}</div>
            <div class="card-bars" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          ${getAppIconMarkup(app.id)}
        </button>
      `).join("");
    }

    function getOrCreateFrame(app) {
      let frame = document.getElementById(\`frame-\${app.id}\`);
      if (frame) return { frame, created: false };

      frame = document.createElement("iframe");
      frame.id = \`frame-\${app.id}\`;
      frame.className = "app-frame";
      frame.src = app.url;
      frame.title = app.name;
      frame.allow =
        "accelerometer; gyroscope; magnetometer; clipboard-write; camera; microphone; geolocation; fullscreen; autoplay; serial; usb; hid; gamepad";
      frame.loading = "eager";
      frame.referrerPolicy = "strict-origin-when-cross-origin";

      frame.addEventListener("load", () => {
        hideLoader();
      });

      frameStage.appendChild(frame);
      return { frame, created: true };
    }

    function hideAllFrames() {
      document.querySelectorAll(".app-frame").forEach(frame => {
        frame.classList.remove("active");
      });
    }

    function setAppUi(app) {
      brandArea.classList.add("hidden");
      appBar.classList.add("active");
      activeAppName.textContent = app.name;
      dashboard.style.display = "none";
      frameContainer.classList.add("active");
      openExternalBtn.classList.add("active");
    }

    function setHomeUi() {
      brandArea.classList.remove("hidden");
      appBar.classList.remove("active");
      activeAppName.textContent = "";
      dashboard.style.display = "block";
      frameContainer.classList.remove("active");
      openExternalBtn.classList.remove("active");
    }

    function openApp(id, updateHash = true) {
      const app = getAppById(id);
      if (!app) return;

      state.currentAppId = id;

      if (app.mode === "external") {
        window.open(app.url, "_blank", "noopener,noreferrer");
        return;
      }

      const { frame, created } = getOrCreateFrame(app);

      hideAllFrames();
      frame.classList.add("active");
      setAppUi(app);

      if (created) {
        showLoader(app.name + " wird geladen …");
      } else {
        hideLoader();
      }

      if (updateHash) {
        location.hash = \`app=\${encodeURIComponent(id)}\`;
      }
    }

    function goHome(updateHash = true) {
      state.currentAppId = null;
      hideAllFrames();
      hideLoader();
      setHomeUi();

      if (updateHash) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function openCurrentExternally() {
      if (!state.currentAppId) return;
      const app = getAppById(state.currentAppId);
      if (!app) return;
      window.open(app.url, "_blank", "noopener,noreferrer");
    }

    function applyRouteFromHash() {
      const hash = location.hash || "";
      if (hash.startsWith("#app=")) {
        const id = decodeURIComponent(hash.replace("#app=", ""));
        if (getAppById(id)) {
          openApp(id, false);
          return;
        }
      }
      goHome(false);
    }

    installBtnFooter.addEventListener("click", async () => {
      if (isIOS()) {
        alert('iPhone / iPad:\\n\\n1. Auf "Teilen"\\n2. "Zum Home-Bildschirm"\\n3. "Hinzufügen"');
        return;
      }

      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        updateInstallUI();
        return;
      }

      if (isAndroid()) {
        alert('Android / Chrome:\\n\\nWenn kein direkter Dialog erscheint:\\nMenü ⋮ → "App installieren"');
        return;
      }

      alert("Installation in diesem Browser derzeit nicht direkt verfügbar.");
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      updateInstallUI();
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      updateInstallUI();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();
      applyRouteFromHash();
      updateInstallUI();
    });

    window.addEventListener("hashchange", applyRouteFromHash);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.currentAppId) {
        goHome();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
