<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>HTB Field Tools</title>

  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0e14;
      --surface: rgba(33, 39, 49, 0.88);
      --surface-2: rgba(45, 53, 65, 0.92);
      --surface-3: rgba(68, 78, 94, 0.38);
      --primary: #ffed00;
      --primary-dark: #ccbe00;
      --text: #ffffff;
      --muted: #b7bcc4;
      --border: rgba(255,255,255,0.08);
      --cyan: rgba(113, 207, 255, 0.65);
      --radius: 18px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --header-base-h: 82px;
      --footer-base-h: 88px;

      --header-total-h: calc(var(--header-base-h) + var(--safe-top));
      --footer-total-h: calc(var(--footer-base-h) + var(--safe-bottom));
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 24%, rgba(110, 190, 255, 0.10), rgba(110, 190, 255, 0) 22%),
        radial-gradient(circle at 82% 18%, rgba(110, 190, 255, 0.08), rgba(110, 190, 255, 0) 24%),
        radial-gradient(circle at 74% 82%, rgba(110, 190, 255, 0.06), rgba(110, 190, 255, 0) 20%),
        linear-gradient(180deg, #1a1f29 0%, #0e1219 40%, #090b10 100%);
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 18% 24%, rgba(110, 190, 255, 0.10), rgba(110, 190, 255, 0) 22%),
        radial-gradient(circle at 82% 18%, rgba(110, 190, 255, 0.08), rgba(110, 190, 255, 0) 24%),
        radial-gradient(circle at 74% 82%, rgba(110, 190, 255, 0.06), rgba(110, 190, 255, 0) 20%),
        linear-gradient(180deg, #1a1f29 0%, #0e1219 40%, #090b10 100%);
    }

    /* Technischer Hintergrund */
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 124px,
          rgba(113, 207, 255, 0.045) 124px 125px
        ),
        repeating-linear-gradient(
          180deg,
          transparent 0 124px,
          rgba(113, 207, 255, 0.035) 124px 125px
        );
      opacity: 0.35;
    }

    body::after {
      background:
        radial-gradient(circle at 78% 14%, rgba(160, 225, 255, 0.55) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 20%, rgba(160, 225, 255, 0.45) 0 1px, transparent 2px),
        radial-gradient(circle at 73% 28%, rgba(160, 225, 255, 0.40) 0 1px, transparent 2px),
        radial-gradient(circle at 84% 36%, rgba(160, 225, 255, 0.50) 0 1px, transparent 2px),
        linear-gradient(100deg, transparent 0 74%, rgba(113, 207, 255, 0.13) 74%, rgba(113, 207, 255, 0.13) 74.2%, transparent 74.2%),
        linear-gradient(86deg, transparent 0 71%, rgba(113, 207, 255, 0.08) 71%, rgba(113, 207, 255, 0.08) 71.15%, transparent 71.15%),
        linear-gradient(92deg, transparent 0 81%, rgba(113, 207, 255, 0.09) 81%, rgba(113, 207, 255, 0.09) 81.15%, transparent 81.15%),
        linear-gradient(0deg, transparent 0 72%, rgba(113, 207, 255, 0.06) 72%, rgba(113, 207, 255, 0.06) 72.15%, transparent 72.15%);
      opacity: 0.55;
    }

    /* HEADER */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: var(--header-total-h);
      padding: calc(10px + var(--safe-top)) 14px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(56,64,72,0.92) 0%, rgba(42,47,54,0.90) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary);
      z-index: 300;
      box-shadow: 0 4px 18px rgba(0,0,0,0.28);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .brand.hidden {
      display: none;
    }

    .logo-container {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: #111111;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 3px 10px rgba(0,0,0,0.22);
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .brand-text {
      min-width: 0;
      line-height: 1.1;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.02rem;
      color: var(--primary);
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 0.74rem;
      color: var(--text);
      opacity: 0.86;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .appbar {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .appbar.active {
      display: flex;
    }

    #activeAppName {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-head {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #3c434c 0%, #2c323a 100%);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color .2s ease, background .2s ease, transform .15s ease;
    }

    .btn-head:hover {
      border-color: var(--primary);
      background: linear-gradient(180deg, #444c56 0%, #343a43 100%);
      transform: translateY(-1px);
    }

    #openExternalBtn {
      display: none;
    }

    #openExternalBtn.active {
      display: inline-flex;
    }

    /* MAIN */
    .main-area {
      position: fixed;
      top: var(--header-total-h);
      left: 0;
      right: 0;
      bottom: var(--footer-total-h);
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(19,22,26,0.72) 0%, rgba(11,12,15,0.86) 100%);
    }

    /* DASHBOARD */
    #dashboard {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 18px 16px 24px;
    }

    .grid {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    @media (min-width: 980px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .card {
      appearance: none;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(45,50,57,0.88) 0%, rgba(35,39,45,0.86) 100%);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--text);
      border-radius: 22px;
      padding: 18px 16px;
      cursor: pointer;
      transition: transform .18s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-align: left;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 10px 24px rgba(0,0,0,0.26);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(113,207,255,0.10), rgba(113,207,255,0) 34%),
        radial-gradient(circle at 12% 20%, rgba(255,255,255,0.08), rgba(255,255,255,0) 30%);
      pointer-events: none;
      opacity: 0.7;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,237,0,0.75);
      background: linear-gradient(180deg, rgba(51,56,64,0.92) 0%, rgba(38,42,49,0.90) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 12px 26px rgba(0,0,0,0.30);
    }

    .card-copy {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1.22;
      color: var(--text);
      text-wrap: balance;
      margin-bottom: 12px;
    }

    .card-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 120px;
    }

    .card-bars span {
      display: block;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(113,207,255,0.85), rgba(113,207,255,0.18));
      box-shadow: 0 0 10px rgba(113,207,255,0.10);
    }

    .card-bars span:nth-child(1) { width: 96px; }
    .card-bars span:nth-child(2) { width: 74px; opacity: 0.82; }
    .card-bars span:nth-child(3) { width: 52px; opacity: 0.68; }

    /* ICONS */
    .icon-shell {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.03) 18%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, #5a5e65 0%, #2f3339 50%, #1c1f23 100%);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.12),
        inset 0 -1px 0 rgba(0,0,0,.35),
        0 14px 24px rgba(0,0,0,.32);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      z-index: 1;
    }

    .icon-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 14%, rgba(255,255,255,.15), rgba(255,255,255,0) 46%);
      pointer-events: none;
    }

    .icon-shell::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 19px;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .icon-shell svg {
      width: 36px;
      height: 36px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.18));
    }

    /* FRAMES */
    #frameContainer {
      position: absolute;
      inset: 0;
      display: none;
      background: var(--bg);
    }

    #frameContainer.active {
      display: block;
    }

    #frameStage {
      position: absolute;
      inset: 0;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
      display: none;
    }

    .app-frame.active {
      display: block;
    }

    /* LOADER */
    #loader {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(17,17,17,.92);
      backdrop-filter: blur(2px);
    }

    #loader.active {
      display: flex;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loaderText {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* FOOTER INSTALL BAR */
    .install-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(36,41,48,0.92) 0%, rgba(28,32,38,0.92) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      border-top: 2px solid var(--primary);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: var(--footer-total-h);
      box-shadow: 0 -6px 18px rgba(0,0,0,0.24);
    }

    .install-bar.hidden {
      display: none;
    }

    .btn {
      background: linear-gradient(180deg, #3b424b 0%, #2d333b 100%);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform .15s ease;
      min-width: 240px;
      max-width: 420px;
      width: 100%;
    }

    .btn:hover {
      background: linear-gradient(180deg, #474f59 0%, #373e47 100%);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #000000;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .install-note {
      font-size: 0.76rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 520px;
    }

    @media (max-width: 520px) {
      .card {
        min-height: 150px;
        padding: 16px 14px;
      }

      .card-title {
        font-size: 0.92rem;
      }

      .card-bars span:nth-child(1) { width: 82px; }
      .card-bars span:nth-child(2) { width: 64px; }
      .card-bars span:nth-child(3) { width: 44px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand" id="brandArea">
      <div class="logo-container" aria-hidden="true">
        <img src="./assets/icon.svg" alt="HTB Logo" width="44" height="44">
      </div>
      <div class="brand-text">
        <h1>HTB Field Tools</h1>
        <p>HTB Baugesellschaft m.b.H.</p>
      </div>
    </div>

    <div class="appbar" id="appBar">
      <button class="btn-head" type="button" onclick="goHome()">← Zurück</button>
      <div id="activeAppName"></div>
    </div>

    <div class="top-actions">
      <button class="btn-head" id="openExternalBtn" type="button" onclick="openCurrentExternally()">↗ Neu öffnen</button>
    </div>
  </header>

  <main class="main-area">
    <section id="dashboard">
      <div id="appGrid" class="grid"></div>
    </section>

    <section id="frameContainer">
      <div id="frameStage"></div>
      <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText">App wird geladen …</div>
      </div>
    </section>
  </main>

  <footer class="install-bar" id="installBar">
    <button class="btn btn-primary" id="installBtnFooter" type="button">Installieren</button>
    <div class="install-note" id="installNote"></div>
  </footer>

  <script src="./apps.js"></script>
  <script>
    const state = {
      currentAppId: null
    };

    let deferredPrompt = null;

    const dashboard = document.getElementById("dashboard");
    const appGrid = document.getElementById("appGrid");
    const frameContainer = document.getElementById("frameContainer");
    const frameStage = document.getElementById("frameStage");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");

    const brandArea = document.getElementById("brandArea");
    const appBar = document.getElementById("appBar");
    const activeAppName = document.getElementById("activeAppName");
    const openExternalBtn = document.getElementById("openExternalBtn");

    const installBar = document.getElementById("installBar");
    const installBtnFooter = document.getElementById("installBtnFooter");
    const installNote = document.getElementById("installNote");

    function getAppById(id) {
      return (window.APPS || []).find(app => app.id === id);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true;
    }

    function showLoader(text = "App wird geladen …") {
      loaderText.textContent = text;
      loader.classList.add("active");
    }

    function hideLoader() {
      loader.classList.remove("active");
    }

    function updateInstallUI() {
      if (isStandalone()) {
        installBar.classList.add("hidden");
        return;
      }

      installBar.classList.remove("hidden");

      if (isIOS()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "iPhone / iPad: Teilen → Zum Home-Bildschirm";
        return;
      }

      if (deferredPrompt) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "App kann direkt installiert werden.";
        return;
      }

      if (isAndroid()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "Falls kein Dialog erscheint: Chrome-Menü ⋮ → App installieren";
        return;
      }

      installBtnFooter.style.display = "none";
      installNote.textContent = "";
    }

    function getAppIconSVG(id) {
      switch (id) {
        case "schwingungsmesser":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 36C11.5 36 13 26 16 26C19.5 26 21 45 24.5 45C28 45 29 16 33 16C37 16 38.5 47 42 47C45.5 47 46.5 30 49 30C52 30 53 38 56 38"
                    stroke="#F2F3F5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 36C11.5 36 13 26 16 26C19.5 26 21 45 24.5 45C28 45 29 16 33 16C37 16 38.5 47 42 47C45.5 47 46.5 30 49 30C52 30 53 38 56 38"
                    stroke="#B8BDC5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
            </svg>
          `;

        case "rammpfahl":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="17" y="14" width="30" height="9" rx="3.5" fill="#F3F4F6"/>
              <rect x="29" y="22" width="6" height="26" rx="3" fill="#D6DAE0"/>
              <rect x="26.5" y="48" width="11" height="4.5" rx="2.25" fill="#F3F4F6"/>
              <rect x="17" y="14" width="30" height="9" rx="3.5" fill="url(#rammGloss)" opacity="0.35"/>
              <defs>
                <linearGradient id="rammGloss" x1="32" y1="14" x2="32" y2="23" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#FFFFFF"/>
                  <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
                </linearGradient>
              </defs>
            </svg>
          `;

        case "pumpversuch":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M32 12C32 12 44 25 44 34C44 40.627 38.627 46 32 46C25.373 46 20 40.627 20 34C20 25 32 12 32 12Z"
                    fill="#F2F3F5"/>
              <path d="M27.5 26.5C25.8 28.8 25 31 25 33" stroke="#5E646C" stroke-width="3" stroke-linecap="round"/>
              <path d="M28 48.5H36" stroke="#D9DDE2" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
            </svg>
          `;

        case "bohrprotokoll":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="20" y="14" width="24" height="36" rx="6" fill="#F3F4F6"/>
              <rect x="26" y="11" width="12" height="8" rx="3" fill="#E3E7EC"/>
              <rect x="24" y="24" width="16" height="3.2" rx="1.6" fill="#858C95"/>
              <rect x="24" y="31" width="16" height="3.2" rx="1.6" fill="#858C95"/>
              <rect x="24" y="38" width="11" height="3.2" rx="1.6" fill="#858C95"/>
              <rect x="20" y="14" width="24" height="36" rx="6" stroke="#9EA4AC" stroke-opacity="0.28"/>
            </svg>
          `;

        case "bohrkernaufnahme":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="24" y="11" width="16" height="42" rx="8" fill="#F3F4F6"/>
              <rect x="24" y="16" width="16" height="5" rx="2.5" fill="#D9DDE2"/>
              <rect x="24" y="26" width="16" height="5" rx="2.5" fill="#D9DDE2"/>
              <rect x="24" y="36" width="16" height="5" rx="2.5" fill="#D9DDE2"/>
              <rect x="24" y="46" width="16" height="5" rx="2.5" fill="#D9DDE2"/>
              <rect x="24" y="11" width="16" height="42" rx="8" stroke="#9EA4AC" stroke-opacity="0.25"/>
              <path d="M28 53V55M36 53V55" stroke="#BFC4CB" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          `;

        default:
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="16" y="16" width="32" height="32" rx="8" fill="#F3F4F6"/>
              <rect x="24" y="30" width="16" height="4" rx="2" fill="#8C939C"/>
              <rect x="16" y="16" width="32" height="32" rx="8" stroke="#9EA4AC" stroke-opacity="0.25"/>
            </svg>
          `;
      }
    }

    function getAppIconMarkup(id) {
      return `
        <div class="icon-shell" aria-hidden="true">
          ${getAppIconSVG(id)}
        </div>
      `;
    }

    function renderDashboard() {
      appGrid.innerHTML = (window.APPS || []).map(app => `
        <button class="card" onclick="openApp('${app.id}')" aria-label="${app.name}">
          <div class="card-copy">
            <div class="card-title">${app.name}</div>
            <div class="card-bars" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          ${getAppIconMarkup(app.id)}
        </button>
      `).join("");
    }

    function getOrCreateFrame(app) {
      let frame = document.getElementById(`frame-${app.id}`);
      if (frame) return { frame, created: false };

      frame = document.createElement("iframe");
      frame.id = `frame-${app.id}`;
      frame.className = "app-frame";
      frame.src = app.url;
      frame.title = app.name;
      frame.allow =
        "accelerometer; gyroscope; magnetometer; clipboard-write; camera; microphone; geolocation; fullscreen; autoplay; serial; usb; hid; gamepad";
      frame.loading = "eager";
      frame.referrerPolicy = "strict-origin-when-cross-origin";

      frame.addEventListener("load", () => {
        hideLoader();
      });

      frameStage.appendChild(frame);
      return { frame, created: true };
    }

    function hideAllFrames() {
      document.querySelectorAll(".app-frame").forEach(frame => {
        frame.classList.remove("active");
      });
    }

    function setAppUi(app) {
      brandArea.classList.add("hidden");
      appBar.classList.add("active");
      activeAppName.textContent = app.name;
      dashboard.style.display = "none";
      frameContainer.classList.add("active");
      openExternalBtn.classList.add("active");
    }

    function setHomeUi() {
      brandArea.classList.remove("hidden");
      appBar.classList.remove("active");
      activeAppName.textContent = "";
      dashboard.style.display = "block";
      frameContainer.classList.remove("active");
      openExternalBtn.classList.remove("active");
    }

    function openApp(id, updateHash = true) {
      const app = getAppById(id);
      if (!app) return;

      state.currentAppId = id;

      if (app.mode === "external") {
        window.open(app.url, "_blank", "noopener,noreferrer");
        return;
      }

      const { frame, created } = getOrCreateFrame(app);

      hideAllFrames();
      frame.classList.add("active");
      setAppUi(app);

      if (created) {
        showLoader(app.name + " wird geladen …");
      } else {
        hideLoader();
      }

      if (updateHash) {
        location.hash = `app=${encodeURIComponent(id)}`;
      }
    }

    function goHome(updateHash = true) {
      state.currentAppId = null;
      hideAllFrames();
      hideLoader();
      setHomeUi();

      if (updateHash) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function openCurrentExternally() {
      if (!state.currentAppId) return;
      const app = getAppById(state.currentAppId);
      if (!app) return;
      window.open(app.url, "_blank", "noopener,noreferrer");
    }

    function applyRouteFromHash() {
      const hash = location.hash || "";
      if (hash.startsWith("#app=")) {
        const id = decodeURIComponent(hash.replace("#app=", ""));
        if (getAppById(id)) {
          openApp(id, false);
          return;
        }
      }
      goHome(false);
    }

    installBtnFooter.addEventListener("click", async () => {
      if (isIOS()) {
        alert('iPhone / iPad:\n\n1. Auf "Teilen"\n2. "Zum Home-Bildschirm"\n3. "Hinzufügen"');
        return;
      }

      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        updateInstallUI();
        return;
      }

      if (isAndroid()) {
        alert('Android / Chrome:\n\nWenn kein direkter Dialog erscheint:\nMenü ⋮ → "App installieren"');
        return;
      }

      alert("Installation in diesem Browser derzeit nicht direkt verfügbar.");
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      updateInstallUI();
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      updateInstallUI();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();
      applyRouteFromHash();
      updateInstallUI();
    });

    window.addEventListener("hashchange", applyRouteFromHash);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.currentAppId) {
        goHome();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
