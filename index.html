<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>HTB Field Tools</title>

  <meta name="theme-color" content="#06101a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #06101a;
      --surface: rgba(6, 16, 26, 0.10);
      --surface-2: rgba(10, 24, 38, 0.18);
      --primary: #ffed00;
      --primary-dark: #ccbe00;
      --text: #ffffff;
      --muted: #c1ceda;
      --border: rgba(151, 251, 255, 0.18);
      --radius: 18px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --header-base-h: 78px;
      --footer-base-h: 88px;

      --header-total-h: calc(var(--header-base-h) + var(--safe-top));
      --footer-total-h: calc(var(--footer-base-h) + var(--safe-bottom));
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: relative;
      isolation: isolate;
      background: var(--bg);
    }

    /* Hintergrund-SVG wirklich hinten */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
      background: #06101a;
    }

    .bg-scene svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* HEADER */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: var(--header-total-h);
      padding: calc(10px + var(--safe-top)) 14px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(6, 16, 26, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 237, 0, 0.95);
      z-index: 300;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .brand.hidden {
      display: none;
    }

    .logo-container {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.28);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 3px 10px rgba(0,0,0,0.18);
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .brand-text {
      min-width: 0;
      line-height: 1.1;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.02rem;
      color: var(--primary);
      letter-spacing: 0.02em;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255,237,0,0.10);
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 0.74rem;
      color: var(--text);
      opacity: 0.88;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .appbar {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .appbar.active {
      display: flex;
    }

    #activeAppName {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-head {
      appearance: none;
      border: 1px solid rgba(151, 251, 255, 0.16);
      background: rgba(6, 16, 26, 0.18);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color .2s ease, background .2s ease, transform .15s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .btn-head:hover {
      border-color: rgba(151, 251, 255, 0.34);
      background: rgba(10, 24, 38, 0.30);
      transform: translateY(-1px);
    }

    #openExternalBtn {
      display: none;
    }

    #openExternalBtn.active {
      display: inline-flex;
    }

    /* MAIN */
    .main-area {
      position: fixed;
      top: var(--header-total-h);
      left: 0;
      right: 0;
      bottom: var(--footer-total-h);
      background: transparent;
      z-index: 1;
    }

    /* DASHBOARD */
    #dashboard {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 16px;
      z-index: 2;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    @media (min-width: 820px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .card {
      appearance: none;
      width: 100%;
      border: 1px solid rgba(151, 251, 255, 0.16);
      background: rgba(7, 17, 27, 0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      border-radius: 18px;
      padding: 18px 14px 16px;
      cursor: pointer;
      transition: transform .15s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
      min-height: 168px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 0 18px rgba(151, 251, 255, 0.08);
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(151, 251, 255, 0.40);
      background: rgba(8, 20, 32, 0.30);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 26px rgba(151, 251, 255, 0.14);
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.25;
      color: var(--text);
      text-shadow: 0 0 10px rgba(0,0,0,0.20);
    }

    /* ICONS */
    .icon-shell {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.03) 18%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(103,108,116,0.70) 0%, rgba(47,51,57,0.82) 50%, rgba(24,27,31,0.92) 100%);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.12),
        inset 0 -1px 0 rgba(0,0,0,.35),
        0 0 16px rgba(151,251,255,0.10),
        0 14px 24px rgba(0,0,0,.32);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .icon-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 14%, rgba(255,255,255,.15), rgba(255,255,255,0) 46%);
      pointer-events: none;
    }

    .icon-shell::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 19px;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .icon-shell svg {
      width: 34px;
      height: 34px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.18));
    }

    /* FRAMES */
    #frameContainer {
      position: absolute;
      inset: 0;
      display: none;
      background: transparent;
    }

    #frameContainer.active {
      display: block;
    }

    #frameStage {
      position: absolute;
      inset: 0;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      display: none;
    }

    .app-frame.active {
      display: block;
    }

    /* LOADER */
    #loader {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(6,16,26,.36);
      backdrop-filter: blur(4px);
    }

    #loader.active {
      display: flex;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loaderText {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* FOOTER INSTALL BAR */
    .install-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(6,16,26,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      border-top: 2px solid rgba(255, 237, 0, 0.95);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: var(--footer-total-h);
      box-shadow: 0 -6px 18px rgba(0,0,0,0.18);
    }

    .install-bar.hidden {
      display: none;
    }

    .btn {
      background: linear-gradient(180deg, rgba(64,73,85,0.42) 0%, rgba(41,49,59,0.42) 100%);
      color: var(--text);
      border: 1px solid rgba(151,251,255,0.16);
      padding: 12px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform .15s ease, box-shadow .2s ease;
      min-width: 240px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 0 16px rgba(151,251,255,0.08);
    }

    .btn:hover {
      background: linear-gradient(180deg, rgba(74,84,97,0.50) 0%, rgba(50,59,69,0.50) 100%);
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(151,251,255,0.14);
    }

    .btn-primary {
      background: rgba(255,237,0,0.90);
      color: #000000;
      border-color: rgba(255,237,0,0.95);
      box-shadow: 0 0 18px rgba(255,237,0,0.16);
    }

    .btn-primary:hover {
      background: rgba(204,190,0,0.92);
      border-color: rgba(204,190,0,0.96);
    }

    .install-note {
      font-size: 0.76rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 520px;
      text-shadow: 0 0 10px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>

  <div class="bg-scene" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" shape-rendering="geometricPrecision">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#06101a"/>
          <stop offset="45%" stop-color="#0a1c2e"/>
          <stop offset="100%" stop-color="#112a40"/>
        </linearGradient>
        <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#41d4ff"/>
          <stop offset="50%" stop-color="#97fbff"/>
          <stop offset="100%" stop-color="#20bfff"/>
        </linearGradient>
        <radialGradient id="vignette" cx="50%" cy="45%" r="78%">
          <stop offset="55%" stop-color="#000814" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000814" stop-opacity="0.62"/>
        </radialGradient>
        <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
          <path d="M24 0H0V24" fill="none" stroke="#7aefff" stroke-opacity="0.035" stroke-width="1"/>
        </pattern>
        <pattern id="majorGrid" width="96" height="96" patternUnits="userSpaceOnUse">
          <path d="M96 0H0V96" fill="none" stroke="#7aefff" stroke-opacity="0.09" stroke-width="1.1"/>
          <path d="M48 0V96M0 48H96" fill="none" stroke="#7aefff" stroke-opacity="0.04" stroke-width="1"/>
        </pattern>
        <pattern id="hatch" width="34" height="34" patternUnits="userSpaceOnUse">
          <path d="M0 34L34 0M-8 8L8 -8M26 42L42 26" fill="none" stroke="#86f1ff" stroke-opacity="0.20" stroke-width="1.2"/>
          <path d="M0 17H34" fill="none" stroke="#86f1ff" stroke-opacity="0.08" stroke-width="1"/>
        </pattern>
        <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b2"/>
          <feMerge>
            <feMergeNode in="b2"/>
            <feMergeNode in="b1"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="9"/>
        </filter>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
          <path d="M0 5L10 0L7 5L10 10Z" fill="#89f8ff" fill-opacity="0.72"/>
        </marker>
      </defs>
      <rect width="1080" height="1920" fill="url(#bg)"/>
      <rect width="1080" height="1920" fill="url(#microGrid)"/>
      <rect width="1080" height="1920" fill="url(#majorGrid)"/>
      <rect width="1080" height="1920" fill="url(#vignette)"/>
      <rect x="150" y="320" width="780" height="520" rx="28" fill="#07111b" fill-opacity="0.14" stroke="#8cf4ff" stroke-opacity="0.05"/>
      <g opacity="0.22" stroke="url(#line)" fill="none" filter="url(#glow)" stroke-linecap="round">
        <rect x="46" y="46" width="988" height="1828" rx="10" stroke-width="1.5"/>
        <rect x="66" y="66" width="948" height="1788" rx="8" stroke-width="1"/>
        <line x1="120" y1="160" x2="960" y2="160" stroke-width="1"/>
        <line x1="120" y1="1760" x2="960" y2="1760" stroke-width="1"/>
      </g>
      <g opacity="0.18" stroke="url(#line)" fill="none" filter="url(#glow)" stroke-linecap="round">
        <path d="M-40 220C120 160 260 290 430 238S790 132 1120 202" stroke-width="1.7"/>
        <path d="M-40 320C160 250 300 390 500 328S860 250 1120 312" stroke-width="1.6"/>
        <path d="M-40 450C180 390 320 520 530 460S860 382 1120 442" stroke-width="1.5"/>
        <path d="M-40 610C130 540 310 690 520 628S850 548 1120 608" stroke-width="1.5"/>
        <path d="M-40 790C140 720 310 860 510 800S850 708 1120 776" stroke-width="1.5"/>
        <path d="M-40 980C170 920 320 1060 530 1000S860 920 1120 980" stroke-width="1.5"/>
        <path d="M-40 1180C150 1110 340 1260 560 1208S900 1120 1120 1188" stroke-width="1.5"/>
        <path d="M-40 1390C180 1320 330 1460 520 1400S860 1320 1120 1388" stroke-width="1.5"/>
        <path d="M-40 1610C150 1540 310 1690 540 1630S860 1540 1120 1608" stroke-width="1.6"/>
        <path d="M-40 1810C170 1740 330 1880 560 1828S880 1760 1120 1814" stroke-width="1.7"/>
      </g>
    </svg>
  </div>

  <header class="topbar">
    <div class="brand" id="brandArea">
      <div class="logo-container" aria-hidden="true">
        <img src="./assets/icon.svg" alt="HTB Logo" width="44" height="44">
      </div>
      <div class="brand-text">
        <h1>HTB Field Tools</h1>
        <p>HTB Baugesellschaft m.b.H.</p>
      </div>
    </div>

    <div class="appbar" id="appBar">
      <button class="btn-head" type="button" onclick="goHome()">← Zurück</button>
      <div id="activeAppName"></div>
    </div>

    <div class="top-actions">
      <button class="btn-head" id="openExternalBtn" type="button" onclick="openCurrentExternally()">↗ Neu öffnen</button>
    </div>
  </header>

  <main class="main-area">
    <section id="dashboard">
      <div id="appGrid" class="grid"></div>
    </section>

    <section id="frameContainer">
      <div id="frameStage"></div>
      <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText">App wird geladen …</div>
      </div>
    </section>
  </main>

  <footer class="install-bar" id="installBar">
    <button class="btn btn-primary" id="installBtnFooter" type="button">Installieren</button>
    <div class="install-note" id="installNote"></div>
  </footer>

  <script src="./apps.js"></script>
  <script>
    const state = {
      currentAppId: null
    };

    let deferredPrompt = null;

    const dashboard = document.getElementById("dashboard");
    const appGrid = document.getElementById("appGrid");
    const frameContainer = document.getElementById("frameContainer");
    const frameStage = document.getElementById("frameStage");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");

    const brandArea = document.getElementById("brandArea");
    const appBar = document.getElementById("appBar");
    const activeAppName = document.getElementById("activeAppName");
    const openExternalBtn = document.getElementById("openExternalBtn");

    const installBar = document.getElementById("installBar");
    const installBtnFooter = document.getElementById("installBtnFooter");
    const installNote = document.getElementById("installNote");

    function getAppById(id) {
      return (window.APPS || []).find(app => app.id === id);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true;
    }

    function showLoader(text = "App wird geladen …") {
      loaderText.textContent = text;
      loader.classList.add("active");
    }

    function hideLoader() {
      loader.classList.remove("active");
    }

    function updateInstallUI() {
      if (isStandalone()) {
        installBar.classList.add("hidden");
        return;
      }

      installBar.classList.remove("hidden");

      if (isIOS()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "iPhone / iPad: Teilen → Zum Home-Bildschirm";
        return;
      }

      if (deferredPrompt) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "App kann direkt installiert werden.";
        return;
      }

      if (isAndroid()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "Falls kein Dialog erscheint: Chrome-Menü ⋮ → App installieren";
        return;
      }

      installBtnFooter.style.display = "none";
      installNote.textContent = "";
    }

    function getAppIconSVG(id) {
      switch (id) {
        case "schwingungsmesser":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 34C14 34 14 18 20 18C26 18 26 46 32 46C38 46 38 18 44 18C50 18 50 34 56 34"
              stroke="#FFED00" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="32" cy="32" r="3.5" fill="#FFFFFF"/>
            </svg>
          `;
        case "rammpfahl":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="27" y="18" width="10" height="27" rx="5" fill="#FFED00"/>
              <rect x="16" y="10" width="32" height="8" rx="4" fill="#FFFFFF"/>
              <path d="M18 50H46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
              <path d="M32 18V10" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `;
        case "pumpversuch":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M32 11C32 11 44 23 44 33C44 39.627 38.627 45 32 45C25.373 45 20 39.627 20 33C20 23 32 11 32 11Z"
              fill="#FFED00"/>
              <path d="M18 50H46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
              <path d="M28 23C26.3 25.6 25 28.6 25 31.5" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
          `;
        case "bohrprotokoll":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="19" y="14" width="26" height="36" rx="5" stroke="#FFFFFF" stroke-width="4"/>
              <rect x="25" y="10" width="14" height="8" rx="3" fill="#FFED00"/>
              <path d="M25 28H39M25 36H39M25 44H35" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `;
        case "bohrkernaufnahme":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="24" y="10" width="16" height="44" rx="8" stroke="#FFFFFF" stroke-width="4"/>
              <path d="M24 18H40M24 28H40M24 38H40M24 48H40" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
              <circle cx="32" cy="14" r="3" fill="#FFED00"/>
            </svg>
          `;
        default:
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="16" y="16" width="32" height="32" rx="8" stroke="#FFFFFF" stroke-width="4"/>
              <path d="M24 32H40" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `;
      }
    }

    function getAppIconMarkup(id) {
      return `
        <div class="icon-shell" aria-hidden="true">
          ${getAppIconSVG(id)}
        </div>
      `;
    }

    function renderDashboard() {
      appGrid.innerHTML = (window.APPS || []).map(app => `
        <button class="card" onclick="openApp('${app.id}')" aria-label="${app.name}">
          ${getAppIconMarkup(app.id)}
          <div class="card-title">${app.name}</div>
        </button>
      `).join("");
    }

    function getOrCreateFrame(app) {
      let frame = document.getElementById(`frame-${app.id}`);
      if (frame) return { frame, created: false };

      frame = document.createElement("iframe");
      frame.id = `frame-${app.id}`;
      frame.className = "app-frame";
      frame.src = app.url;
      frame.title = app.name;
      frame.allow =
        "accelerometer; gyroscope; magnetometer; clipboard-write; camera; microphone; geolocation; fullscreen; autoplay; serial; usb; hid; gamepad";
      frame.loading = "eager";
      frame.referrerPolicy = "strict-origin-when-cross-origin";

      frame.addEventListener("load", () => {
        hideLoader();
      });

      frameStage.appendChild(frame);
      return { frame, created: true };
    }

    function hideAllFrames() {
      document.querySelectorAll(".app-frame").forEach(frame => {
        frame.classList.remove("active");
      });
    }

    function setAppUi(app) {
      brandArea.classList.add("hidden");
      appBar.classList.add("active");
      activeAppName.textContent = app.name;
      dashboard.style.display = "none";
      frameContainer.classList.add("active");
      openExternalBtn.classList.add("active");
    }

    function setHomeUi() {
      brandArea.classList.remove("hidden");
      appBar.classList.remove("active");
      activeAppName.textContent = "";
      dashboard.style.display = "block";
      frameContainer.classList.remove("active");
      openExternalBtn.classList.remove("active");
    }

    function openApp(id, updateHash = true) {
      const app = getAppById(id);
      if (!app) return;

      state.currentAppId = id;

      if (app.mode === "external") {
        window.open(app.url, "_blank", "noopener,noreferrer");
        return;
      }

      const { frame, created } = getOrCreateFrame(app);

      hideAllFrames();
      frame.classList.add("active");
      setAppUi(app);

      if (created) {
        showLoader(app.name + " wird geladen …");
      } else {
        hideLoader();
      }

      if (updateHash) {
        location.hash = `app=${encodeURIComponent(id)}`;
      }
    }

    function goHome(updateHash = true) {
      state.currentAppId = null;
      hideAllFrames();
      hideLoader();
      setHomeUi();

      if (updateHash) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function openCurrentExternally() {
      if (!state.currentAppId) return;
      const app = getAppById(state.currentAppId);
      if (!app) return;
      window.open(app.url, "_blank", "noopener,noreferrer");
    }

    function applyRouteFromHash() {
      const hash = location.hash || "";
      if (hash.startsWith("#app=")) {
        const id = decodeURIComponent(hash.replace("#app=", ""));
        if (getAppById(id)) {
          openApp(id, false);
          return;
        }
      }
      goHome(false);
    }

    installBtnFooter.addEventListener("click", async () => {
      if (isIOS()) {
        alert('iPhone / iPad:\n\n1. Auf "Teilen"\n2. "Zum Home-Bildschirm"\n3. "Hinzufügen"');
        return;
      }

      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        updateInstallUI();
        return;
      }

      if (isAndroid()) {
        alert('Android / Chrome:\n\nWenn kein direkter Dialog erscheint:\nMenü ⋮ → "App installieren"');
        return;
      }

      alert("Installation in diesem Browser derzeit nicht direkt verfügbar.");
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      updateInstallUI();
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      updateInstallUI();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();
      applyRouteFromHash();
      updateInstallUI();
    });

    window.addEventListener("hashchange", applyRouteFromHash);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.currentAppId) {
        goHome();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
