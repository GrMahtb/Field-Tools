<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Field Tools</title>
  <meta name="theme-color" content="#06101a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:           #06101a;
      --surface:      rgba(7, 17, 27, 0.22);
      --surface-2:    rgba(9, 22, 35, 0.32);
      --primary:      #ffed00;
      --primary-dark: #ccbe00;
      --text:         #ffffff;
      --muted:        #c1ceda;
      --border:       #1e3048;
      --radius:       14px;
      --safe-top:     env(safe-area-inset-top, 0px);
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
      --header-base-h: 78px;
      --footer-base-h: 88px;
      --header-total-h: calc(var(--header-base-h) + var(--safe-top));
      --footer-total-h: calc(var(--footer-base-h) + var(--safe-bottom));
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* ── Hintergrund ── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: var(--bg);
    }
    .bg-scene svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Header ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      min-height: var(--header-total-h);
      padding: calc(10px + var(--safe-top)) 14px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(6, 16, 26, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid var(--primary);
      z-index: 300;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
    .brand.hidden { display: none; }

    .logo-container {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(0,0,0,0.3);
      border-radius: 10px; overflow: hidden;
    }
    .logo-container img {
      width: 100%; height: 100%;
      object-fit: contain; display: block; border-radius: 10px;
    }

    .brand-text { min-width: 0; line-height: 1.1; }
    .brand-text h1 {
      margin: 0; font-size: 1.02rem;
      color: var(--primary); letter-spacing: 0.02em; font-weight: 800;
    }
    .brand-text p {
      margin: 4px 0 0; font-size: 0.74rem;
      color: var(--text); opacity: 0.88;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .appbar { display: none; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .appbar.active { display: flex; }

    #activeAppName {
      min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: var(--primary); font-weight: 800; font-size: 0.98rem;
    }

    .top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn-head {
      appearance: none;
      border: 1px solid rgba(151,251,255,0.16);
      background: rgba(6,16,26,0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      padding: 8px 12px; border-radius: 10px;
      cursor: pointer; font: inherit; font-weight: 700;
      white-space: nowrap;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: border-color .2s, background .2s, transform .15s;
    }
    .btn-head:hover {
      border-color: rgba(151,251,255,0.36);
      background: rgba(10,24,38,0.32);
      transform: translateY(-1px);
    }

    #openExternalBtn { display: none; }
    #openExternalBtn.active { display: inline-flex; }

    /* ── Main ── */
    .main-area {
      position: fixed;
      top: var(--header-total-h); left: 0; right: 0; bottom: var(--footer-total-h);
      z-index: 10;
      background: transparent;
    }

    /* ── Dashboard ── */
    #dashboard {
      position: absolute; inset: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .grid {
      max-width: 960px; margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    @media (min-width: 820px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .card {
      appearance: none; width: 100%;
      border: 1px solid rgba(151,251,255,0.16);
      background: rgba(7,17,27,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text); border-radius: 18px;
      padding: 18px 14px 16px; cursor: pointer;
      transition: transform .15s, border-color .2s, background .2s, box-shadow .2s;
      min-height: 168px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 14px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 0 18px rgba(151,251,255,0.07);
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(151,251,255,0.40);
      background: rgba(8,20,32,0.30);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 26px rgba(151,251,255,0.13);
    }

    .card-title {
      font-size: 0.95rem; font-weight: 800;
      line-height: 1.25; color: var(--text);
    }

    /* ── Icons ── */
    .icon-shell {
      width: 72px; height: 72px; border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.02) 18%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(42,62,82,0.80) 0%, rgba(16,28,44,0.90) 50%, rgba(9,16,26,0.96) 100%);
      border: 1px solid rgba(151,251,255,0.16);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.35),
        0 0 16px rgba(151,251,255,0.10),
        0 10px 20px rgba(0,0,0,0.30);
      display: grid; place-items: center;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .icon-shell::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 12%, rgba(255,255,255,0.12), rgba(255,255,255,0) 48%);
      pointer-events: none;
    }
    .icon-shell::after {
      content: "";
      position: absolute; inset: 1px; border-radius: 19px;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .icon-shell svg {
      width: 36px; height: 36px;
      position: relative; z-index: 1;
      filter: drop-shadow(0 0 5px rgba(151,251,255,0.18));
    }

    /* ── Frames ── */
    #frameContainer {
      position: absolute; inset: 0;
      display: none; background: var(--bg);
    }
    #frameContainer.active { display: block; }
    #frameStage { position: absolute; inset: 0; }
    .app-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: 0;
      background: var(--bg); display: none;
    }
    .app-frame.active { display: block; }

    /* ── Loader ── */
    #loader {
      position: absolute; inset: 0; z-index: 50;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      background: rgba(6,16,26,0.40); backdrop-filter: blur(4px);
    }
    #loader.active { display: flex; }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loaderText { color: var(--muted); font-size: 0.9rem; }

    /* ── Install Bar ── */
    .install-bar {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: rgba(6,16,26,0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      border-top: 2px solid var(--primary);
      z-index: 300;
      display: flex; flex-direction: column; gap: 8px;
      align-items: center; justify-content: center;
      min-height: var(--footer-total-h);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.16);
    }
    .install-bar.hidden { display: none; }

    .btn {
      background: linear-gradient(180deg, rgba(56,68,82,0.44) 0%, rgba(36,48,60,0.44) 100%);
      color: var(--text);
      border: 1px solid rgba(151,251,255,0.16);
      padding: 12px 16px; border-radius: var(--radius);
      cursor: pointer; font-weight: bold; font-size: 0.95rem; font-family: inherit;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
      min-width: 240px; max-width: 420px; width: 100%;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .btn:hover {
      background: linear-gradient(180deg, rgba(68,82,97,0.52) 0%, rgba(46,60,74,0.52) 100%);
      transform: translateY(-1px);
    }
    .btn-primary {
      background: var(--primary);
      color: #000; border-color: var(--primary);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .install-note {
      font-size: 0.76rem; color: var(--muted);
      text-align: center; line-height: 1.35; max-width: 520px;
    }
  </style>
</head>
<body>

  <!-- Hintergrund -->

        </pattern>
        <pattern id="majorGrid" width="96" height="96" patternUnits="userSpaceOnUse">
          <path d="M96 0H0V96" fill="none" stroke="#7aefff" stroke-opacity="0.09"  stroke-width="1.1"/>
          <path d="M48 0V96M0 48H96" fill="none" stroke="#7aefff" stroke-opacity="0.04" stroke-width="1"/>
        </pattern>
        <pattern id="hatch" width="34" height="34" patternUnits="userSpaceOnUse">

        </pattern>
        <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">

          <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b2"/>
          <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>

        <circle cx="170"  cy="972"  r="1.8"/>
        <circle cx="981"  cy="1502" r="1.8"/>
        <circle cx="805"  cy="1105" r="2"/>
        <circle cx="366"  cy="1492" r="2.2"/>
        <circle cx="822"  cy="1176" r="2.2"/>
      </g>
    </svg>
  </div>

  <!-- Header -->
  <header class="topbar">
    <div class="brand" id="brandArea">
      <div class="logo-container" aria-hidden="true">
        <img src="./assets/icon.svg" alt="HTB Logo" width="44" height="44">
      </div>
      <div class="brand-text">
        <h1>Field Tools</h1>
        <p>HTB Baugesellschaft m.b.H.</p>
      </div>
    </div>

    <div class="appbar" id="appBar">
      <button class="btn-head" type="button" onclick="goHome()">← Zurück</button>
      <div id="activeAppName"></div>
    </div>

    <div class="top-actions">
      <button class="btn-head" id="openExternalBtn" type="button" onclick="openCurrentExternally()">↗ Neu öffnen</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main-area">
    <section id="dashboard">
      <div id="appGrid" class="grid"></div>
    </section>

    <section id="frameContainer">
      <div id="frameStage"></div>
      <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText">App wird geladen …</div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="install-bar" id="installBar">
    <button class="btn btn-primary" id="installBtnFooter" type="button">Installieren</button>
    <div class="install-note" id="installNote"></div>
  </footer>

  <script src="./apps.js"></script>
  <script>
    const state = { currentAppId: null };
    let deferredPrompt = null;

    const dashboard      = document.getElementById("dashboard");
    const appGrid        = document.getElementById("appGrid");
    const frameContainer = document.getElementById("frameContainer");
    const frameStage     = document.getElementById("frameStage");
    const loader         = document.getElementById("loader");
    const loaderText     = document.getElementById("loaderText");
    const brandArea      = document.getElementById("brandArea");
    const appBar         = document.getElementById("appBar");
    const activeAppName  = document.getElementById("activeAppName");
    const openExternalBtn= document.getElementById("openExternalBtn");
    const installBar     = document.getElementById("installBar");
    const installBtnFooter = document.getElementById("installBtnFooter");
    const installNote    = document.getElementById("installNote");

    function getAppById(id) {
      return (window.APPS || []).find(app => app.id === id);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
          || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches
          || window.navigator.standalone === true;
    }

    function showLoader(text = "App wird geladen …") {
      loaderText.textContent = text;
      loader.classList.add("active");
    }

    function hideLoader() {
      loader.classList.remove("active");
    }

    function updateInstallUI() {
      if (isStandalone()) {
        installBar.classList.add("hidden");
        return;
      }
      installBar.classList.remove("hidden");

      if (isIOS()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent   = "Installieren";
        installNote.textContent = "iPhone / iPad: Teilen → Zum Home-Bildschirm";
        return;
      }
      if (deferredPrompt) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent   = "Installieren";
        installNote.textContent = "App kann direkt installiert werden.";
        return;
      }
      if (isAndroid()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent   = "Installieren";
        installNote.textContent = "Falls kein Dialog erscheint: Chrome-Menü ⋮ → App installieren";
        return;
      }
      installBtnFooter.style.display = "none";
      installNote.textContent = "";
    }

    function getAppIconSVG(id) {
      switch (id) {
        case "schwingungsmesser":
          return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 34C13 34 13.5 20 19 20C24 20 24.5 44 30 44C35 44 35.5 14 41 14C46.5 14 47 34 52 34C54 34 55 28 56 28"
                  stroke="#97FBFF" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="31" cy="30" r="3.4" fill="#D7FDFF"/>
            <circle cx="31" cy="30" r="1.4" fill="#7AEFFF"/>
          </svg>`;

        case "rammpfahl":
          return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="18" y="14" width="28" height="8" rx="3" stroke="#D7FDFF" stroke-width="3.2"/>
            <rect x="28" y="22" width="8"  height="23" rx="3" stroke="#97FBFF" stroke-width="3.2"/>
            <path d="M18 50H46" stroke="#D7FDFF" stroke-width="3.2" stroke-linecap="round"/>
            <path d="M32 12V18" stroke="#7AEFFF" stroke-width="3.2" stroke-linecap="round"/>
          </svg>`;

        case "pumpversuch":
          return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 12C32 12 44 24 44 34C44 40.627 38.627 46 32 46C25.373 46 20 40.627 20 34C20 24 32 12 32 12Z"
                  stroke="#D7FDFF" stroke-width="3.2" fill="rgba(122,239,255,0.08)"/>
            <path d="M26.5 27.5C25.1 29.4 24.5 31.1 24.5 33" stroke="#97FBFF" stroke-width="3" stroke-linecap="round"/>
            <path d="M18 50H46" stroke="#7AEFFF" stroke-width="3.2" stroke-linecap="round"/>
          </svg>`;

        case "bohrprotokoll":
          return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="14" width="24" height="36" rx="5" stroke="#D7FDFF" stroke-width="3.2"/>
            <rect x="26" y="10.5" width="12" height="8" rx="3" stroke="#97FBFF" stroke-width="3"/>
            <path d="M25 28H39M25 36H39M25 44H35" stroke="#7AEFFF" stroke-width="3.2" stroke-linecap="round"/>
          </svg>`;

        case "bohrkernaufnahme":
          return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="24" y="10" width="16" height="44" rx="8" stroke="#D7FDFF" stroke-width="3.2"/>
            <path d="M24 18H40M24 28H40M24 38H40M24 48H40" stroke="#7AEFFF" stroke-width="3.2" stroke-linecap="round"/>
            <circle cx="32" cy="14" r="2.2" fill="#97FBFF"/>
          </svg>`;

        default:
          return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="16" y="16" width="32" height="32" rx="8" stroke="#D7FDFF" stroke-width="3.2"/>
            <path d="M24 32H40" stroke="#97FBFF" stroke-width="3.2" stroke-linecap="round"/>
          </svg>`;
      }
    }

    function getAppIconMarkup(id) {
      return `<div class="icon-shell" aria-hidden="true">${getAppIconSVG(id)}</div>`;
    }

    function renderDashboard() {
      appGrid.innerHTML = (window.APPS || []).map(app => `
        <button class="card" onclick="openApp('${app.id}')" aria-label="${app.name}">
          ${getAppIconMarkup(app.id)}
          <div class="card-title">${app.name}</div>
        </button>
      `).join("");
    }

    function getOrCreateFrame(app) {
      let frame = document.getElementById(`frame-${app.id}`);
      if (frame) return { frame, created: false };

      frame = document.createElement("iframe");
      frame.id    = `frame-${app.id}`;
      frame.className = "app-frame";
      frame.src   = app.url;
      frame.title = app.name;
      frame.allow = "accelerometer; gyroscope; magnetometer; clipboard-write; camera; microphone; geolocation; fullscreen; autoplay; serial; usb; hid; gamepad";
      frame.loading = "eager";
      frame.referrerPolicy = "strict-origin-when-cross-origin";
      frame.addEventListener("load", () => hideLoader());
      frameStage.appendChild(frame);
      return { frame, created: true };
    }

    function hideAllFrames() {
      document.querySelectorAll(".app-frame").forEach(f => f.classList.remove("active"));
    }

    function setAppUi(app) {
      brandArea.classList.add("hidden");
      appBar.classList.add("active");
      activeAppName.textContent = app.name;
      dashboard.style.display = "none";
      frameContainer.classList.add("active");
      openExternalBtn.classList.add("active");
    }

    function setHomeUi() {
      brandArea.classList.remove("hidden");
      appBar.classList.remove("active");
      activeAppName.textContent = "";
      dashboard.style.display = "block";
      frameContainer.classList.remove("active");
      openExternalBtn.classList.remove("active");
    }

    function openApp(id, updateHash = true) {
      const app = getAppById(id);
      if (!app) return;
      state.currentAppId = id;

      if (app.mode === "external") {
        window.open(app.url, "_blank", "noopener,noreferrer");
        return;
      }

      const { frame, created } = getOrCreateFrame(app);
      hideAllFrames();
      frame.classList.add("active");
      setAppUi(app);
      if (created) showLoader(app.name + " wird geladen …");
      else hideLoader();
      if (updateHash) location.hash = `app=${encodeURIComponent(id)}`;
    }

    function goHome(updateHash = true) {
      state.currentAppId = null;
      hideAllFrames();
      hideLoader();
      setHomeUi();
      if (updateHash) history.replaceState(null, "", location.pathname + location.search);
    }

    function openCurrentExternally() {
      if (!state.currentAppId) return;
      const app = getAppById(state.currentAppId);
      if (app) window.open(app.url, "_blank", "noopener,noreferrer");
    }

    function applyRouteFromHash() {
      const hash = location.hash || "";
      if (hash.startsWith("#app=")) {
        const id = decodeURIComponent(hash.replace("#app=", ""));
        if (getAppById(id)) { openApp(id, false); return; }
      }
      goHome(false);
    }

    installBtnFooter.addEventListener("click", async () => {
      if (isIOS()) {
        alert('iPhone / iPad:\n\n1. Auf "Teilen"\n2. "Zum Home-Bildschirm"\n3. "Hinzufügen"');
        return;
      }
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch (e) {}
        deferredPrompt = null;
        updateInstallUI();
        return;
      }
      if (isAndroid()) {
        alert('Android / Chrome:\n\nMenü ⋮ → "App installieren"');
        return;
      }
      alert("Installation in diesem Browser derzeit nicht direkt verfügbar.");
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      updateInstallUI();
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      updateInstallUI();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();
      applyRouteFromHash();
      updateInstallUI();
    });

    window.addEventListener("hashchange", applyRouteFromHash);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.currentAppId) goHome();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
