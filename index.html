<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HTB Anwendungen</title>
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #111111;
      --surface: #1e1e1e;
      --surface-2: #2c2c2c;
      --primary: #ffed00;
      --primary-dark: #ccbe00;
      --text: #ffffff;
      --muted: #aaaaaa;
      --border: #333333;
      --radius: 12px;
      --header-h: 64px;
      --tabbar-h: 64px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: var(--surface);
      border-bottom: 2px solid var(--primary);
      z-index: 300;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .brand.hidden {
      display: none;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: #111;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.05rem;
      color: var(--primary);
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .appbar {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .appbar.active {
      display: flex;
    }

    .btn-head {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-head:hover {
      border-color: var(--primary);
    }

    #activeAppName {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--primary);
      font-weight: 700;
    }

    #openExternalBtn {
      display: none;
    }

    #openExternalBtn.active {
      display: inline-flex;
    }

    .main-area {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--tabbar-h);
      background: var(--bg);
    }

    #dashboard {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      padding-top: 4px;
    }

    .card {
      appearance: none;
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: transform .15s ease, border-color .2s ease, background .2s ease;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      background: var(--surface-2);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    #frameContainer {
      position: absolute;
      inset: 0;
      display: none;
      background: var(--bg);
    }

    #frameContainer.active {
      display: block;
    }

    #frameStage {
      position: absolute;
      inset: 0;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
      display: none;
    }

    .app-frame.active {
      display: block;
    }

    #loader {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(17,17,17,.92);
    }

    #loader.active {
      display: flex;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loaderText {
      color: var(--muted);
      font-size: 0.9rem;
    }

    #tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--tabbar-h);
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      background: var(--surface);
      border-top: 2px solid var(--primary);
      z-index: 300;
      overflow-x: auto;
    }

    .tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 72px;
      position: relative;
    }

    .tab:hover {
      background: var(--surface-2);
    }

    .tab.active {
      color: var(--primary);
    }

    .tab.active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18%;
      right: 18%;
      height: 3px;
      background: var(--primary);
      border-radius: 0 0 4px 4px;
    }

    .tab-icon {
      font-size: 1.25rem;
      line-height: 1;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      #tabbar {
        height: calc(var(--tabbar-h) + env(safe-area-inset-bottom));
        padding-bottom: env(safe-area-inset-bottom);
      }
      .main-area {
        bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand" id="brandArea">
      <div class="logo" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="80" fill="#111111"/>
          <g transform="translate(256,256) scale(0.72) translate(-318.9,-248)">
            <path fill="#ffed00" d="M531.5,177.12H148.73l43.08-28.73c6.57-4.38,14.29-6.72,22.18-6.72h285.8s-140.7-93.84-140.7-93.84c-.7-.48-1.44-.95-2.15-1.42-21.73-14.64-54.36-14.64-76.09,0-.72.48-1.44.94-2.15,1.42L66.6,189.29h0c-4.68,3.2-8.98,6.93-12.8,11.12-41.01,45.63-8.95,118.29,52.5,118.53h382.77l-43.08,28.73c-6.57,4.38-14.29,6.72-22.19,6.72H138.01s140.71,93.84,140.71,93.84c.7.49,1.44.95,2.15,1.43,21.73,14.64,54.36,14.64,76.09,0,.72-.48,1.44-.94,2.14-1.42l212.1-141.45h0c4.69-3.21,9.01-6.96,12.84-11.16,11.73-12.89,18.35-30.15,18.33-47.58,0-39.16-31.73-70.9Z"/>
          </g>
        </svg>
      </div>
      <div class="brand-text">
        <h1>HTB Anwendungen</h1>
      </div>
    </div>

    <div class="appbar" id="appBar">
      <button class="btn-head" onclick="goHome()">← Zurück</button>
      <div id="activeAppName"></div>
    </div>

    <button class="btn-head" id="openExternalBtn" onclick="openCurrentExternally()">↗ Neu öffnen</button>
  </header>

  <main class="main-area">
    <section id="dashboard">
      <div id="appGrid" class="grid"></div>
    </section>

    <section id="frameContainer">
      <div id="frameStage"></div>
      <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText">App wird geladen …</div>
      </div>
    </section>
  </main>

  <nav id="tabbar"></nav>

  <script src="./apps.js"></script>
  <script>
    const state = {
      currentAppId: null
    };

    const dashboard = document.getElementById("dashboard");
    const appGrid = document.getElementById("appGrid");
    const tabbar = document.getElementById("tabbar");
    const frameContainer = document.getElementById("frameContainer");
    const frameStage = document.getElementById("frameStage");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");

    const brandArea = document.getElementById("brandArea");
    const appBar = document.getElementById("appBar");
    const activeAppName = document.getElementById("activeAppName");
    const openExternalBtn = document.getElementById("openExternalBtn");

    function getAppById(id) {
      return (window.APPS || []).find(app => app.id === id);
    }

    function showLoader(text = "App wird geladen …") {
      loaderText.textContent = text;
      loader.classList.add("active");
    }

    function hideLoader() {
      loader.classList.remove("active");
    }

    function renderDashboard() {
      appGrid.innerHTML = (window.APPS || []).map(app => `
        <button class="card" onclick="openApp('${app.id}')">
          <div>
            <div class="card-icon">${app.icon || "🧩"}</div>
            <div class="card-title">${app.name}</div>
          </div>
        </button>
      `).join("");
    }

    function renderTabs() {
      const homeTab = `
        <button class="tab active" data-tab="home" onclick="goHome()">
          <span class="tab-icon">🏠</span>
          <span>Home</span>
        </button>
      `;

      const appTabs = (window.APPS || []).map(app => `
        <button class="tab" data-tab="${app.id}" onclick="openApp('${app.id}')">
          <span class="tab-icon">${app.icon || "🧩"}</span>
          <span>${app.shortName || app.name}</span>
        </button>
      `).join("");

      tabbar.innerHTML = homeTab + appTabs;
    }

    function setActiveTab(id) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      const target = document.querySelector(`.tab[data-tab="${id}"]`);
      if (target) target.classList.add("active");
    }

    function getOrCreateFrame(app) {
      let frame = document.getElementById(`frame-${app.id}`);
      if (frame) return { frame, created: false };

      frame = document.createElement("iframe");
      frame.id = `frame-${app.id}`;
      frame.className = "app-frame";
      frame.src = app.url;
      frame.title = app.name;
      frame.allow =
        "accelerometer; gyroscope; magnetometer; clipboard-write; camera; microphone; geolocation; fullscreen; autoplay; serial; usb; hid; gamepad";
      frame.loading = "eager";

      frame.addEventListener("load", () => {
        hideLoader();
      });

      frameStage.appendChild(frame);
      return { frame, created: true };
    }

    function hideAllFrames() {
      document.querySelectorAll(".app-frame").forEach(frame => {
        frame.classList.remove("active");
      });
    }

    function setAppUi(app) {
      brandArea.classList.add("hidden");
      appBar.classList.add("active");
      openExternalBtn.classList.add("active");
      activeAppName.textContent = app.name;
      dashboard.style.display = "none";
      frameContainer.classList.add("active");
      setActiveTab(app.id);
    }

    function setHomeUi() {
      brandArea.classList.remove("hidden");
      appBar.classList.remove("active");
      openExternalBtn.classList.remove("active");
      activeAppName.textContent = "";
      dashboard.style.display = "block";
      frameContainer.classList.remove("active");
      setActiveTab("home");
    }

    function openApp(id, updateHash = true) {
      const app = getAppById(id);
      if (!app) return;

      state.currentAppId = id;

      if (app.mode === "external") {
        window.open(app.url, "_blank", "noopener,noreferrer");
        return;
      }

      const { frame, created } = getOrCreateFrame(app);

      hideAllFrames();
      frame.classList.add("active");
      setAppUi(app);

      if (created) {
        showLoader(app.name + " wird geladen …");
      } else {
        hideLoader();
      }

      if (updateHash) {
        location.hash = `app=${encodeURIComponent(id)}`;
      }
    }

    function goHome(updateHash = true) {
      state.currentAppId = null;
      hideAllFrames();
      hideLoader();
      setHomeUi();

      if (updateHash) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function openCurrentExternally() {
      if (!state.currentAppId) return;
      const app = getAppById(state.currentAppId);
      if (!app) return;
      window.open(app.url, "_blank", "noopener,noreferrer");
    }

    function applyRouteFromHash() {
      const hash = location.hash || "";
      if (hash.startsWith("#app=")) {
        const id = decodeURIComponent(hash.replace("#app=", ""));
        if (getAppById(id)) {
          openApp(id, false);
          return;
        }
      }
      goHome(false);
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();
      renderTabs();
      applyRouteFromHash();
    });

    window.addEventListener("hashchange", applyRouteFromHash);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.currentAppId) {
        goHome();
      }
    });
  </script>
</body>
</html>
