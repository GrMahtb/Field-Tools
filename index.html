<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Field Tools</title>

  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #111111;
      --surface: #1e1e1e;
      --surface-2: #2c2c2c;
      --primary: #ffed00;
      --primary-dark: #ccbe00;
      --text: #ffffff;
      --muted: #aaaaaa;
      --border: #333333;
      --danger: #ff5252;
      --radius: 12px;
      --header-h: 72px;
      --footer-h: 82px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body { background: var(--bg); }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 2px solid var(--primary);
      z-index: 300;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .brand.hidden { display: none; }

    .logo-container {
      width: 44px;
      height: 44px;
      margin-right: 2px;
      flex-shrink: 0;
      background: #111111;
      border-radius: 10px;
      overflow: hidden;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .brand-text {
      min-width: 0;
      line-height: 1.1;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.02rem;
      color: var(--primary);
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 0.74rem;
      color: var(--text);
      opacity: 0.86;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .appbar {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .appbar.active { display: flex; }

    #activeAppName {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-head {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color .2s ease, background .2s ease;
    }

    .btn-head:hover {
      border-color: var(--primary);
      background: #353535;
    }

    #openExternalBtn {
      display: none;
    }

    #openExternalBtn.active {
      display: inline-flex;
    }

    .main-area {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--footer-h);
      background: var(--bg);
    }

    #dashboard {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    @media (min-width: 720px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .card {
      appearance: none;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 18px;
      padding: 18px 14px 16px;
      cursor: pointer;
      transition: transform .15s ease, border-color .2s ease, background .2s ease;
      min-height: 168px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      background: var(--surface-2);
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
    }

    .icon-shell {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      background: linear-gradient(180deg, #414141 0%, #242424 48%, #171717 100%);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 10px 18px rgba(0,0,0,.28);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .icon-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,0) 45%);
      pointer-events: none;
    }

    .icon-shell svg {
      width: 44px;
      height: 44px;
      position: relative;
      z-index: 1;
    }

    #frameContainer {
      position: absolute;
      inset: 0;
      display: none;
      background: var(--bg);
    }

    #frameContainer.active { display: block; }

    #frameStage {
      position: absolute;
      inset: 0;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
      display: none;
    }

    .app-frame.active { display: block; }

    #loader {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(17,17,17,.92);
      backdrop-filter: blur(2px);
    }

    #loader.active { display: flex; }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loaderText {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .install-bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--surface);
  padding: 12px 16px;
  border-top: 2px solid var(--primary);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  justify-content: center;
  min-height: var(--footer-h);
}
    {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--surface);
      padding: 12px 16px;
      border-top: 2px solid var(--primary);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: var(--footer-h);
    }

    .install-bar.hidden { display: none; }

    .btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      min-width: 240px;
      max-width: 420px;
      width: 100%;
    }

    .btn:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--primary);
      color: #000000;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .install-note {
      font-size: 0.76rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 520px;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .install-bar {
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
        min-height: calc(var(--footer-h) + env(safe-area-inset-bottom));
      }

      .main-area {
        bottom: calc(var(--footer-h) + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand" id="brandArea">
      <div class="logo-container" aria-hidden="true">
        <img src="./assets/icon.svg" alt="HTB Logo" width="44" height="44">
      </div>
      <div class="brand-text">
        <h1>Field Tools</h1>
        <p>HTB Baugesellschaft m.b.H.</p>
      </div>
    </div>

    <div class="appbar" id="appBar">
      <button class="btn-head" type="button" onclick="goHome()">← Zurück</button>
      <div id="activeAppName"></div>
    </div>

    <div class="top-actions">
      <button class="btn-head" id="openExternalBtn" type="button" onclick="openCurrentExternally()">↗ Neu öffnen</button>
    </div>
  </header>

  <main class="main-area">
    <section id="dashboard">
      <div id="appGrid" class="grid"></div>
    </section>

    <section id="frameContainer">
      <div id="frameStage"></div>
      <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText">App wird geladen …</div>
      </div>
    </section>
  </main>

  <footer class="install-bar" id="installBar">
    <button class="btn btn-primary" id="installBtnFooter" type="button">Installieren</button>
    <div class="install-note" id="installNote"></div>
  </footer>

  <script src="./apps.js"></script>
  <script>
    const state = {
      currentAppId: null
    };

    let deferredPrompt = null;

    const dashboard = document.getElementById("dashboard");
    const appGrid = document.getElementById("appGrid");
    const frameContainer = document.getElementById("frameContainer");
    const frameStage = document.getElementById("frameStage");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");

    const brandArea = document.getElementById("brandArea");
    const appBar = document.getElementById("appBar");
    const activeAppName = document.getElementById("activeAppName");
    const openExternalBtn = document.getElementById("openExternalBtn");

    const installBar = document.getElementById("installBar");
    const installBtnFooter = document.getElementById("installBtnFooter");
    const installNote = document.getElementById("installNote");

    function getAppById(id) {
      return (window.APPS || []).find(app => app.id === id);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true;
    }

    function showLoader(text = "App wird geladen …") {
      loaderText.textContent = text;
      loader.classList.add("active");
    }

    function hideLoader() {
      loader.classList.remove("active");
    }

    function updateInstallUI() {
      if (isStandalone()) {
        installBar.classList.add("hidden");
        return;
      }

      installBar.classList.remove("hidden");

      if (isIOS()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "iPhone / iPad: Teilen → Zum Home-Bildschirm";
        return;
      }

      if (deferredPrompt) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "App kann direkt installiert werden.";
        return;
      }

      if (isAndroid()) {
        installBtnFooter.style.display = "inline-flex";
        installBtnFooter.textContent = "Installieren";
        installNote.textContent = "Falls kein Dialog erscheint: Chrome-Menü ⋮ → App installieren";
        return;
      }

      installBtnFooter.style.display = "none";
      installNote.textContent = "";
    }

    function getAppIconSVG(id) {
      switch (id) {
        case "schwingungsmesser":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 34C14 34 14 18 20 18C26 18 26 46 32 46C38 46 38 18 44 18C50 18 50 34 56 34"
                    stroke="#FFED00" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="32" cy="32" r="3.5" fill="#FFFFFF"/>
            </svg>
          `;
        case "rammpfahl":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="27" y="18" width="10" height="27" rx="5" fill="#FFED00"/>
              <rect x="16" y="10" width="32" height="8" rx="4" fill="#FFFFFF"/>
              <path d="M18 50H46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
              <path d="M32 18V10" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `;
        case "pumpversuch":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M32 11C32 11 44 23 44 33C44 39.627 38.627 45 32 45C25.373 45 20 39.627 20 33C20 23 32 11 32 11Z"
                    fill="#FFED00"/>
              <path d="M18 50H46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
              <path d="M28 23C26.3 25.6 25 28.6 25 31.5" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
          `;
        case "bohrprotokoll":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="19" y="14" width="26" height="36" rx="5" stroke="#FFFFFF" stroke-width="4"/>
              <rect x="25" y="10" width="14" height="8" rx="3" fill="#FFED00"/>
              <path d="M25 28H39M25 36H39M25 44H35" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `;
        case "bohrkernaufnahme":
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="24" y="10" width="16" height="44" rx="8" stroke="#FFFFFF" stroke-width="4"/>
              <path d="M24 18H40M24 28H40M24 38H40M24 48H40" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
              <circle cx="32" cy="14" r="3" fill="#FFED00"/>
            </svg>
          `;
        default:
          return `
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="16" y="16" width="32" height="32" rx="8" stroke="#FFFFFF" stroke-width="4"/>
              <path d="M24 32H40" stroke="#FFED00" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `;
      }
    }

    function getAppIconMarkup(id) {
      return `
        <div class="icon-shell" aria-hidden="true">
          ${getAppIconSVG(id)}
        </div>
      `;
    }

    function renderDashboard() {
      appGrid.innerHTML = (window.APPS || []).map(app => `
        <button class="card" onclick="openApp('${app.id}')" aria-label="${app.name}">
          ${getAppIconMarkup(app.id)}
          <div class="card-title">${app.name}</div>
        </button>
      `).join("");
    }

    function getOrCreateFrame(app) {
      let frame = document.getElementById(`frame-${app.id}`);
      if (frame) return { frame, created: false };

      frame = document.createElement("iframe");
      frame.id = `frame-${app.id}`;
      frame.className = "app-frame";
      frame.src = app.url;
      frame.title = app.name;
      frame.allow =
        "accelerometer; gyroscope; magnetometer; clipboard-write; camera; microphone; geolocation; fullscreen; autoplay; serial; usb; hid; gamepad";
      frame.loading = "eager";
      frame.referrerPolicy = "strict-origin-when-cross-origin";

      frame.addEventListener("load", () => {
        hideLoader();
      });

      frameStage.appendChild(frame);
      return { frame, created: true };
    }

    function hideAllFrames() {
      document.querySelectorAll(".app-frame").forEach(frame => {
        frame.classList.remove("active");
      });
    }

    function setAppUi(app) {
      brandArea.classList.add("hidden");
      appBar.classList.add("active");
      activeAppName.textContent = app.name;
      dashboard.style.display = "none";
      frameContainer.classList.add("active");
      openExternalBtn.classList.add("active");
    }

    function setHomeUi() {
      brandArea.classList.remove("hidden");
      appBar.classList.remove("active");
      activeAppName.textContent = "";
      dashboard.style.display = "block";
      frameContainer.classList.remove("active");
      openExternalBtn.classList.remove("active");
    }

    function openApp(id, updateHash = true) {
      const app = getAppById(id);
      if (!app) return;

      state.currentAppId = id;

      if (app.mode === "external") {
        window.open(app.url, "_blank", "noopener,noreferrer");
        return;
      }

      const { frame, created } = getOrCreateFrame(app);

      hideAllFrames();
      frame.classList.add("active");
      setAppUi(app);

      if (created) {
        showLoader(app.name + " wird geladen …");
      } else {
        hideLoader();
      }

      if (updateHash) {
        location.hash = `app=${encodeURIComponent(id)}`;
      }
    }

    function goHome(updateHash = true) {
      state.currentAppId = null;
      hideAllFrames();
      hideLoader();
      setHomeUi();

      if (updateHash) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function openCurrentExternally() {
      if (!state.currentAppId) return;
      const app = getAppById(state.currentAppId);
      if (!app) return;
      window.open(app.url, "_blank", "noopener,noreferrer");
    }

    function applyRouteFromHash() {
      const hash = location.hash || "";
      if (hash.startsWith("#app=")) {
        const id = decodeURIComponent(hash.replace("#app=", ""));
        if (getAppById(id)) {
          openApp(id, false);
          return;
        }
      }
      goHome(false);
    }

    installBtnFooter.addEventListener("click", async () => {
      if (isIOS()) {
        alert('iPhone / iPad:\n\n1. Unten oder oben auf "Teilen"\n2. "Zum Home-Bildschirm"\n3. "Hinzufügen"');
        return;
      }

      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        updateInstallUI();
        return;
      }

      if (isAndroid()) {
        alert('Android / Chrome:\n\nWenn kein direkter Dialog erscheint:\nMenü ⋮ → "App installieren"');
        return;
      }

      alert("Installation in diesem Browser derzeit nicht direkt verfügbar.");
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      updateInstallUI();
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      updateInstallUI();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();
      applyRouteFromHash();
      updateInstallUI();
    });

    window.addEventListener("hashchange", applyRouteFromHash);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.currentAppId) {
        goHome();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
